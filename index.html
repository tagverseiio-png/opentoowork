<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenTooWork - US Job Platform for Active Job Seekers | Employer Matching</title>

    <!-- Primary Meta Tags (SEO) -->
    <meta name="description" content="OpenTooWork connects skilled candidates with top US employers. Find jobs matching your skills, location, and career goals. Browse open positions, manage applications, and grow your career." />
    <meta name="title" content="OpenTooWork - US Job Board & Recruitment Platform" />
    <meta name="author" content="OpenTooWork" />
    <meta name="keywords" content="job search, job board, US jobs, employment, recruitment, career, job matching, job portal, hiring, work authorization" />

    <!-- SEO & Indexing -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="bingbot" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    
    <!-- Canonical URL (GEO/Duplicate Content Prevention) -->
    <link rel="canonical" href="https://opentoowork.tech/" />
    
    <!-- Language & Localization (GEO) -->
    <meta name="language" content="English" />
    <meta name="content-language" content="en-US" />
    <meta http-equiv="content-language" content="en-US" />
    
    <!-- Geographic Targeting (GEO) -->
    <meta name="geo.placename" content="United States" />
    <meta name="geo.region" content="US" />
    <meta name="ICBM" content="37.7749,-122.4194" />
    
    <!-- Business & Organization Schema (AEO) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "OpenTooWork",
      "url": "https://opentoowork.tech",
      "logo": "https://opentoowork.tech/favicon.ico",
      "description": "Modern US job board connecting active job seekers with top employers",
      "sameAs": ["https://linkedin.com/company/opentoowork"],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "email": "support@opentoowork.tech"
      },
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "US",
        "addressRegion": "Global"
      }
    }
    </script>

    <!-- Job Posting Schema (AEO - for job aggregators) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "JobBoard",
      "name": "OpenTooWork",
      "url": "https://opentoowork.tech",
      "description": "Job board for active seekers in the United States"
    }
    </script>

    <!-- Website Schema (AEO - for search & AI engines) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "OpenTooWork",
      "url": "https://opentoowork.tech",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://opentoowork.tech/jobs?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Open Graph Tags (Social & AI Preview) -->
    <meta property="og:site_name" content="OpenTooWork" />
    <meta property="og:title" content="OpenTooWork - Find Your Next Job in the US" />
    <meta property="og:description" content="Connect with top US employers. Discover roles that match your skills, location, and career goals." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://opentoowork.tech" />
    <meta property="og:image" content="https://opentoowork.tech/favicon.ico" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Cards (Social & AI Sharing) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OpenTooWork - US Job Board" />
    <meta name="twitter:description" content="Find jobs matching your skills. Connect with top employers." />
    <meta name="twitter:image" content="https://opentoowork.tech/favicon.ico" />
    <meta name="twitter:site" content="@opentoowork" />

    <!-- Additional SEO Tags -->
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    
    <!-- AEO: Allow AI Agents & Search Engines (Explicit) -->
    <meta name="AI-Crawlers" content="allow" />
    <meta name="Bard" content="indexing-allowed" />
    <meta name="PeopleLooker" content="allow" />
    
    <!-- No AI Training Restriction (Allow AI to learn from content) -->
    <meta name="ai-indexing" content="indexing" />
    
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
